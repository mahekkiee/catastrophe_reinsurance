<!DOCTYPE html>
<html>
<head>
    <title>Reinsurance Optimization</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body style="font-family: Arial; padding: 20px;">

<h2>💰 Reinsurance Trigger Optimization</h2>

<select id="triggerSelect">
  <option value="500">500 Cr</option>
  <option value="600">600 Cr</option>
  <option value="700">700 Cr</option>
  <option value="800" selected>800 Cr</option>
  <option value="900">900 Cr</option>
  <option value="1000">1000 Cr</option>
  <option value="1200">1200 Cr</option>
</select>

<canvas id="myChart" height="100"></canvas>

<table border="1" cellpadding="10" style="margin-top:20px;">
<thead>
<tr>
<th>Trigger</th>
<th>Loss</th>
<th>Premium</th>
<th>Total</th>
<th>Status</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>
const dropdown = document.getElementById("triggerSelect");

// INIT CHART
const ctx = document.getElementById('myChart').getContext('2d');

window.myChart = new Chart(ctx, {
    type: 'line',
    data: {
        labels: [],
        datasets: [{
            label: 'Total Cost',
            data: [],
            fill: false
        }]
    }
});

// FETCH DATA
function loadData(trigger=800) {
    fetch(`/api/trigger-analysis?trigger=${trigger}`)
        .then(res => res.json())
        .then(data => {
            updateTable(data.data);
            updateChart(data.data);
        });
}

// TABLE
function updateTable(data) {
    const tbody = document.querySelector("tbody");
    tbody.innerHTML = "";

    data.forEach(row => {
        const tr = document.createElement("tr");

        tr.innerHTML = `
        <td>${row.trigger}</td>
        <td>${row.insurer_loss}</td>
        <td>${row.premium}</td>
        <td>${row.total_cost}</td>
        <td>${row.status === 'optimal' ? '✅' : ''}</td>
        `;

        tbody.appendChild(tr);
    });
}

// CHART
function updateChart(data) {
    const labels = data.map(d => d.trigger);
    const values = data.map(d => d.total_cost);

    window.myChart.data.labels = labels;
    window.myChart.data.datasets[0].data = values;
    window.myChart.update();
}

// DROPDOWN EVENT
dropdown.addEventListener("change", function () {
    loadData(this.value);
});

// INITIAL LOAD
loadData();
</script>

</body>
</html>
